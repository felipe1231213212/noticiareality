<script>
(function(){
  var headlines = [["OFERTA HOY", "Click aqui"], ["PROMO FLASH", "Solo por minutos"], ["VIP", "Acceso premium"], ["NO TE PIERDAS", "Mira aqui"]];
  var fb = document.getElementById('fb');
  var hd = headlines[Math.floor(Math.random() * headlines.length)];
  fb.firstChild.textContent = hd[0] + ' - ' + hd[1];

  function checkAd() {
    var els = document.body.querySelectorAll('iframe, ins, img:not([class])');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.classList && el.classList.contains('fb')) continue;
      var r = el.getBoundingClientRect();
      if (r.width >= 50 || r.height >= 25) return true;
    }
    return false;
  }

  function report(filled, hide) {
    if (window.parent !== window) {
      window.parent.postMessage({type:'nr_ad', slot:'468x60', filled:filled, hide:hide, url:location.pathname}, '*');
    }
  }

  setTimeout(function(){ if (!checkAd()) fb.classList.add('show'); }, 4000);
  setTimeout(function(){ var has = checkAd(); report(has, !has); if (!has) fb.classList.remove('show'); }, 10000);
})();
</script>
