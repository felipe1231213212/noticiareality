<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{margin:0;padding:0;background:transparent;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;width:300px;height:250px;position:relative;font-family:-apple-system,Arial,sans-serif;}
.fb{display:none;position:absolute;inset:0;z-index:1;color:white;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;font-weight:900;text-align:center;padding:8px;line-height:1.2;cursor:pointer;background:linear-gradient(135deg,#dc2626,#7f1d1d);}
.fb.show{display:flex;animation:fade .3s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fb:hover{filter:brightness(1.15);}
.fb .h{font-size:19px;letter-spacing:0.5px;text-transform:uppercase;text-shadow:0 2px 4px rgba(0,0,0,.4);}
.fb .s{font-size:12px;font-weight:600;margin-top:4px;opacity:0.95;}
.fb::after{content:'PUBLICIDAD';position:absolute;top:3px;right:5px;font-size:8px;opacity:.65;letter-spacing:1px;font-weight:700;}
body > iframe,body > ins,body > img:not([class]){position:relative;z-index:2;}
</style>
</head>
<body>
<a href="https://omg10.com/4/10967488" target="_blank" rel="noopener nofollow sponsored" class="fb" id="fb">
  <span class="h">OFERTA DEL DIA</span>
  <span class="s">Las mejores promociones</span>
</a>
<script type="text/javascript">
  atOptions = { 'key' : '56f421252bc25889a156a22a386a874e', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
</script>
<script type="text/javascript" src="//www.highperformanceformat.com/56f421252bc25889a156a22a386a874e/invoke.js"></script>
<script>
(function(){
  function check() {
    var els = document.body.querySelectorAll('iframe, ins, img:not([class])');
    var hasReal = false;
    for (var i = 0; i < els.length; i++) {
      var r = els[i].getBoundingClientRect();
      if (r.width > 50 && r.height > 25) { hasReal = true; break; }
    }
    if (!hasReal) document.getElementById('fb').classList.add('show');
  }
  setTimeout(check, 4000);
})();
</script>
</body>
</html>
