<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{margin:0;padding:0;background:transparent;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;width:300px;height:250px;position:relative;font-family:-apple-system,Arial,sans-serif;}
.fb{display:none;position:absolute;inset:0;z-index:1;color:white;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;font-weight:900;text-align:center;padding:8px;line-height:1.2;cursor:pointer;background-color:#dc2626;background-size:cover;background-position:center;}
.fb::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.55),rgba(0,0,0,0.75)),linear-gradient(135deg,#dc2626,#7f1d1d);mix-blend-mode:multiply;}
.fb.show{display:flex;animation:fade .3s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fb:hover{filter:brightness(1.18);}
.fb .h{font-size:19px;letter-spacing:0.5px;text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.7);position:relative;z-index:2;}
.fb .s{font-size:12px;font-weight:600;margin-top:4px;opacity:0.95;text-shadow:0 1px 4px rgba(0,0,0,.6);position:relative;z-index:2;max-width:90%;}
.fb::after{content:"PUBLICIDAD";position:absolute;top:3px;right:5px;font-size:8px;opacity:.7;letter-spacing:1px;font-weight:700;z-index:2;}
body > iframe,body > ins,body > img:not([class]){position:relative;z-index:2;}
</style>
</head>
<body>

<script>
(function(){
  var imgs = ["banner_300x250_01.jpg", "banner_300x250_02.jpg", "banner_300x250_03.jpg", "banner_300x250_04.jpg", "banner_300x250_05.jpg", "banner_300x250_06.jpg", "banner_300x250_07.jpg", "banner_300x250_08.jpg", "banner_300x250_09.jpg", "banner_300x250_10.jpg", "banner_300x250_11.jpg", "banner_300x250_12.jpg", "banner_300x250_13.jpg", "banner_300x250_14.jpg", "banner_300x250_15.jpg"];
  var headlines = [["OFERTA RELAMPAGO", "Descuentos increibles solo hoy"], ["PROMO EXCLUSIVA", "Hasta 80 por ciento de descuento"], ["OFERTA DEL DIA", "Las mejores promociones seleccionadas"], ["GANA AHORA", "Sin gastar nada de tu bolsillo"], ["OFERTAS VIP", "Solo para nuestros lectores"], ["PROMOCION SECRETA", "Lo que millones aprovechan hoy"], ["ULTIMAS UNIDADES", "Aprovecha antes que se acabe"], ["OPORTUNIDAD UNICA", "Solo por las proximas 24h"], ["MEGA DESCUENTO", "Precios que no veras de nuevo"], ["OFERTA CALIENTE", "Click ahora y descubre"], ["LIQUIDACION TOTAL", "Todo a mitad de precio"], ["PREMIUM", "Acceso exclusivo VIP"]];
  var fb = document.getElementById('fb');
  var img = imgs[Math.floor(Math.random() * imgs.length)];
  var hd = headlines[Math.floor(Math.random() * headlines.length)];
  fb.style.backgroundImage = "url('/ads/img/" + img + "')";
  document.getElementById('fbh').textContent = hd[0];
  document.getElementById('fbs').textContent = hd[1];
  function checkAd() {
    var els = document.body.querySelectorAll('iframe, ins, img:not([class]), embed, video');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.classList && el.classList.contains('fb')) continue;
      var r = el.getBoundingClientRect();
      if (r.width >= 100 || r.height >= 50) return true;
    }
    return false;
  }
  fb.classList.add('show');
  [1500, 3000, 5000, 8000, 12000].forEach(function(ms){
    setTimeout(function(){ if (checkAd()) fb.classList.remove('show'); }, ms);
  });

  // Reporta status pra pagina parent (postMessage)
  function report() {
    var filled = checkAd();
    if (window.parent !== window) {
      window.parent.postMessage({type:'nr_ad', slot:'300x250', filled:filled, url:location.pathname}, '*');
    }
  }
  setTimeout(report, 6000);
  setTimeout(report, 14000);
})();
</script>
