<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{margin:0;padding:0;background:transparent;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;width:160px;height:600px;position:relative;font-family:-apple-system,Arial,sans-serif;}
.fb{display:none;position:absolute;inset:0;z-index:1;color:white;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;font-weight:900;text-align:center;padding:8px;line-height:1.2;cursor:pointer;background-color:#7c3aed;background-size:cover;background-position:center;}
.fb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.55),rgba(0,0,0,0.75)),linear-gradient(135deg,#7c3aed,#3b0764);mix-blend-mode:multiply;}
.fb.show{display:flex;animation:fade .3s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fb:hover{filter:brightness(1.18);}
.fb .h{font-size:19px;letter-spacing:0.5px;text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.7);position:relative;z-index:2;}
.fb .s{font-size:12px;font-weight:600;margin-top:4px;opacity:0.95;text-shadow:0 1px 4px rgba(0,0,0,.6);position:relative;z-index:2;max-width:90%;}
.fb::after{content:'PUBLICIDAD';position:absolute;top:3px;right:5px;font-size:8px;opacity:.7;letter-spacing:1px;font-weight:700;z-index:2;}
body > iframe,body > ins,body > img:not([class]){position:relative;z-index:2;}
</style>
</head>
<body>
<a href="https://motionless-bus.com/bF3/Vy0.PQ3tp-v/b/m/VsJpZPDf0/3CMLDBEp5TN/jzMm3mL/T/cawkM/TjkL2aNKDgET" target="_blank" rel="noopener nofollow sponsored" class="fb" id="fb">
  <span class="h" id="fbh">OFERTA</span>
  <span class="s" id="fbs">Click ahora</span>
</a>
<script type="text/javascript">
  atOptions = { 'key' : 'eeacb475fd03764d05ec25946d8a60f7', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {} };
</script>
<script type="text/javascript" src="//www.highperformanceformat.com/eeacb475fd03764d05ec25946d8a60f7/invoke.js"></script>
<script>
(function(){
  // Pool de imagens locais
  var imgs = ["banner_160x600_01.jpg", "banner_160x600_02.jpg", "banner_160x600_03.jpg", "banner_160x600_04.jpg", "banner_160x600_05.jpg", "banner_160x600_06.jpg", "banner_160x600_07.jpg", "banner_160x600_08.jpg", "banner_160x600_09.jpg", "banner_160x600_10.jpg"];
  var headlines = [["OFERTA RELAMPAGO", "Descuentos increibles solo hoy"], ["PROMO EXCLUSIVA", "Hasta 80 por ciento de descuento"], ["OFERTA DEL DIA", "Las mejores promociones seleccionadas"], ["GANA AHORA", "Sin gastar nada de tu bolsillo"], ["OFERTAS VIP", "Solo para nuestros lectores"], ["PROMOCION SECRETA", "Lo que millones aprovechan hoy"], ["ULTIMAS UNIDADES", "Aprovecha antes que se acabe"], ["OPORTUNIDAD UNICA", "Solo por las proximas 24h"], ["MEGA DESCUENTO", "Precios que no veras de nuevo"], ["OFERTA CALIENTE", "Click ahora y descubre"], ["LIQUIDACION TOTAL", "Todo a mitad de precio"], ["PREMIUM", "Acceso exclusivo VIP"]];
  // Aplica imagem random + headline random
  var fb = document.getElementById('fb');
  var img = imgs[Math.floor(Math.random() * imgs.length)];
  var hd = headlines[Math.floor(Math.random() * headlines.length)];
  fb.style.backgroundImage = "url('/ads/img/" + img + "')";
  document.getElementById('fbh').textContent = hd[0];
  document.getElementById('fbs').textContent = hd[1];
  // Verifica em 4s se ad real preencheu
  function check() {
    var els = document.body.querySelectorAll('iframe, ins, img:not([class])');
    var hasReal = false;
    for (var i = 0; i < els.length; i++) {
      var r = els[i].getBoundingClientRect();
      if (r.width > 50 && r.height > 25) { hasReal = true; break; }
    }
    if (!hasReal) fb.classList.add('show');
  }
  setTimeout(check, 4000);
})();
</script>
</body>
</html>
