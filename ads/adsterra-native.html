<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{margin:0;padding:0;background:transparent;font-family:-apple-system,Arial,sans-serif;overflow:hidden;}
body{position:relative;min-height:280px;}
.fb{display:none;position:absolute;inset:0;z-index:1;color:white;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;font-weight:900;text-align:center;padding:24px;background-color:#dc2626;background-size:cover;background-position:center;}
.fb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.55),rgba(0,0,0,0.7)),linear-gradient(135deg,#dc2626,#7f1d1d);mix-blend-mode:multiply;}
.fb.show{display:flex;animation:fade .3s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fb:hover{filter:brightness(1.18);}
.fb::after{content:'PUBLICIDAD';position:absolute;top:8px;right:10px;font-size:10px;opacity:.7;letter-spacing:1px;font-weight:700;z-index:2;}
.fb .h{font-size:24px;letter-spacing:0.5px;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.6);margin-bottom:10px;position:relative;z-index:2;}
.fb .s{font-size:14px;font-weight:600;opacity:0.95;margin-bottom:18px;max-width:380px;position:relative;z-index:2;}
.fb .btn{background:white;color:#dc2626;padding:11px 24px;border-radius:4px;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.5px;position:relative;z-index:2;}
body > div, body > iframe, body > ins{position:relative;z-index:2;}
</style>
</head>
<body>
<a href="https://omg10.com/4/10967488" target="_blank" rel="noopener nofollow sponsored" class="fb" id="fb">
  <span class="h" id="fbh">Ofertas exclusivas hoy</span>
  <span class="s" id="fbs">Las mejores promociones del dia</span>
  <span class="btn">Ver ofertas &rarr;</span>
</a>
<script async="async" data-cfasync="false" src="//pl29343175.profitablecpmratenetwork.com/47a7896b87c371c4d9256b8f7e4d522a/invoke.js"></script>
<div id="container-47a7896b87c371c4d9256b8f7e4d522a"></div>
<script>
(function(){
  var imgs = IMG_POOL;
  var headlines = HEADLINES_POOL;
  var fb = document.getElementById('fb');
  var img = imgs[Math.floor(Math.random() * imgs.length)];
  var hd = headlines[Math.floor(Math.random() * headlines.length)];
  fb.style.backgroundImage = "url('/ads/img/" + img + "')";
  document.getElementById('fbh').textContent = hd[0];
  document.getElementById('fbs').textContent = hd[1];

  var hideCTA = function() { fb.classList.remove('show'); };
  var showCTA = function() { fb.classList.add('show'); };

  function checkAd() {
    // Procura iframe ad-real: tamanho grande E nao-vazio (mais permissivo)
    var ifrs = document.body.querySelectorAll('iframe');
    for (var i = 0; i < ifrs.length; i++) {
      var ifr = ifrs[i];
      var r = ifr.getBoundingClientRect();
      // Ad real: width >= 100 OR height >= 50 (criterio mais permissivo)
      if (r.width >= 100 || r.height >= 50) return true;
    }
    // Procura tambem ins (Google AdSense), img sem class, embed
    var others = document.body.querySelectorAll('ins, img:not([class]), embed, video');
    for (var j = 0; j < others.length; j++) {
      var r2 = others[j].getBoundingClientRect();
      if (r2.width >= 100 || r2.height >= 50) return true;
    }
    return false;
  }

  // CTA aparece imediato (caso ad nao chegar)
  showCTA();

  // Verifica em 2s, 4s, 6s, 10s - se ad chegou, esconde CTA
  [2000, 4000, 6000, 10000].forEach(function(ms){
    setTimeout(function(){
      if (checkAd()) hideCTA();
    }, ms);
  });

  // Reporta status pra pagina parent (postMessage)
  function report() {
    var filled = checkAd();
    if (window.parent !== window) {
      window.parent.postMessage({type:'nr_ad', slot:'Native', filled:filled, url:location.pathname}, '*');
    }
  }
  setTimeout(report, 6000);
  setTimeout(report, 14000);
})();
</script>
</body>
</html>
