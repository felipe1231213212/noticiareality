<script>
(function(){
  function check() {
    var els = document.body.querySelectorAll('iframe, ins, img, embed');
    var hasReal = false;
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.classList && el.classList.contains('fallback-cta')) continue;
      var rect = el.getBoundingClientRect();
      if (rect.width > 50 && rect.height > 25) { hasReal = true; break; }
    }
    if (hasReal) {
      var fb = document.querySelector('.fallback-cta');
      if (fb) fb.style.display = 'none';
    }
  }
  setTimeout(check, 1500);
  setTimeout(check, 3500);
  setTimeout(check, 6000);
})();
</script>
