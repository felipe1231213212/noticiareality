<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
html,body{margin:0;padding:0;background:transparent;font-family:Arial,sans-serif;overflow:hidden;}
body{position:relative;min-height:280px;}
.fb{display:none;position:absolute;inset:0;z-index:1;color:white;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;text-align:center;padding:24px;background:linear-gradient(135deg,#dc2626,#7f1d1d);}
.fb.show{display:flex;animation:fade .3s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fb:hover{filter:brightness(1.12);}
.fb .lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;opacity:0.85;text-transform:uppercase;margin-bottom:8px;}
.fb .h{font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.fb .s{font-size:13px;font-weight:600;opacity:0.95;margin-bottom:18px;max-width:380px;}
.fb .btn{background:white;color:#dc2626;padding:10px 22px;border-radius:4px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}
body > div, body > iframe, body > ins{position:relative;z-index:2;}
</style></head><body>
<a href="https://omg10.com/4/10967488" target="_blank" rel="noopener nofollow sponsored" class="fb" id="fb">
  <span class="lbl">Publicidad</span>
  <span class="h">Ofertas exclusivas hoy</span>
  <span class="s">Las mejores promociones del dia, seleccionadas para ti</span>
  <span class="btn">Ver ofertas</span>
</a>
<script async="async" data-cfasync="false" src="//pl29343175.profitablecpmratenetwork.com/47a7896b87c371c4d9256b8f7e4d522a/invoke.js"></script>
<div id="container-47a7896b87c371c4d9256b8f7e4d522a"></div>
<script>
(function(){
  function checkAd() {
    var c = document.getElementById('container-47a7896b87c371c4d9256b8f7e4d522a');
    if (c && (c.children.length > 0 || c.offsetHeight > 50)) return true;
    var others = document.body.querySelectorAll('iframe, ins');
    for (var i=0; i<others.length; i++) {
      var r = others[i].getBoundingClientRect();
      if (r.width > 100 && r.height > 50) return true;
    }
    return false;
  }
  function report(filled, hide) {
    if (window.parent !== window) {
      window.parent.postMessage({type:'nr_ad', slot:'Native', filled:filled, hide:hide, url:location.pathname}, '*');
    }
  }
  setTimeout(function(){ if (!checkAd()) document.getElementById('fb').classList.add('show'); }, 4000);
  
})();
</script>
</body></html>
