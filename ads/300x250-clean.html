<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
html,body{margin:0;padding:0;background:transparent;overflow:hidden;font-family:Arial,sans-serif}
body{position:relative;width:300px;height:250px}
@keyframes fade{from{opacity:0}to{opacity:1}}

.fb{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px;cursor:pointer;color:#fff;text-decoration:none;text-align:center;background:linear-gradient(160deg,#7f1d1d 0%,#dc2626 50%,#ef4444 100%)}
.fb.show{display:flex;animation:fade .4s}
.fb .ic{font-size:42px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.fb .h{font-size:24px;font-weight:900;line-height:1.15;text-shadow:0 2px 6px rgba(0,0,0,.25)}
.fb .s{font-size:12px;opacity:.92;line-height:1.35}
.fb .btn{background:#fcd34d;color:#7f1d1d;padding:10px 22px;border-radius:24px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.5px;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.fb:hover{filter:brightness(1.06)}
body > iframe, body > ins, body > div:not(.fb){position:relative;z-index:2}
</style></head><body>
<a class="fb" id="fb">
  <span class="ic">🎰</span>
  <span class="h">CASINO BÔNUS</span>
  <span class="s">$500 USD GRATIS<br>Solo registro</span>
  <span class="btn">JUGAR AHORA</span>
</a>
<script type="text/javascript">atOptions={'key':'56f421252bc25889a156a22a386a874e','format':'iframe','height':250,'width':300,'params':{}};</script>
<script type="text/javascript" src="//www.highperformanceformat.com/56f421252bc25889a156a22a386a874e/invoke.js"></script>
<script>
(function(){
  var fb = document.getElementById('fb');
  fb.addEventListener('click', function(e){
    e.preventDefault();
    if (window.parent !== window) {
      window.parent.postMessage({type:'nr_ad_click', slot:'300x250'}, '*');
    }
  });
  function checkAdFilled(){
    var subs = document.body.querySelectorAll('iframe, ins, img:not([class])');
    for (var i=0;i<subs.length;i++){
      var el = subs[i];
      var r = el.getBoundingClientRect();
      if (r.width >= 50 && r.height >= 30) return true;
    }
    return false;
  }
  setTimeout(function(){
    if (!checkAdFilled()) {
      fb.classList.add('show');
      // notifica o parent que mostramos house ad
      if (window.parent !== window) {
        window.parent.postMessage({type:'nr_house_ad', slot:'300x250'}, '*');
      }
    } else {
      // notifica o parent que ad real fillou
      if (window.parent !== window) {
        window.parent.postMessage({type:'nr_ad_filled', slot:'300x250'}, '*');
      }
    }
  }, 4000);
})();
</script>
</body></html>
