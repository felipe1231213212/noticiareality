<!DOCTYPE html>

.fb:hover{filter:brightness(1.12);}
.fb .lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;opacity:0.85;text-transform:uppercase;margin-bottom:6px;}

.fb .btn{background:white;color:#0f172a;padding:8px 18px;border-radius:4px;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;}
body > iframe,body > ins,body > img:not([class]){position:relative;z-index:2;}
</style></head><body>

    var s1 = document.createElement('script');s1.src = '//www.highperformanceformat.com/d40ca2f6d1cca6650834f941cf6865b9/invoke.js';document.body.appendChild(s1);

<script>
(function(){
  var headlines = [["OFERTA HOY", "Click aqui"], ["PROMO FLASH", "Solo por minutos"], ["VIP", "Acceso premium"], ["NO TE PIERDAS", "Mira aqui"]];
  var fb = document.getElementById('fb');
  var hd = headlines[Math.floor(Math.random() * headlines.length)];
  document.getElementById('fbh').textContent = hd[0];
  document.getElementById('fbs').textContent = hd[1];

  function checkAd() {
    var els = document.body.querySelectorAll('iframe, ins, img:not([class]), embed, video');
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.classList && el.classList.contains('fb')) continue;
      var r = el.getBoundingClientRect();
      if (r.width >= 100 || r.height >= 50) return true;
    }
    return false;
  }

  function report(filled, hide) {
    if (window.parent !== window) {
      window.parent.postMessage({type:'nr_ad', slot:'160x300', filled:filled, hide:hide, url:location.pathname}, '*');
    }
  }

  // 4s: se ad real nao chegou, mostra CTA limpo
  setTimeout(function(){
    if (!checkAd()) fb.classList.add('show');
  }, 4000);

  // 10s: se AINDA nao tem ad real, esconde o slot inteiro (hide_me message)
  setTimeout(function(){
    var has = checkAd();
    report(has, false);
    if (!has) {
      // Esconde CTA tambem - slot vai sumir totalmente via parent
      fb.classList.remove('show');
    }
  }, 10000);
})();
</script>
