<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
html,body{margin:0;padding:0;background:transparent;overflow:hidden;font-family:Arial,sans-serif}
body{position:relative;width:300px;height:250px}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{left:-60%}100%{left:160%}}
.fb{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px;cursor:pointer;color:#fff;text-decoration:none;text-align:center;background:linear-gradient(160deg,#3b0764 0%,#7e22ce 50%,#a855f7 100%);overflow:hidden}
.fb.show{display:flex;animation:fade .4s}
.fb::after{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);animation:shimmer 2.6s infinite;pointer-events:none}
.fb .ic{font-size:42px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));position:relative;z-index:1}
.fb .h{font-size:22px;font-weight:900;line-height:1.15;text-shadow:0 2px 6px rgba(0,0,0,.3);position:relative;z-index:1}
.fb .s{font-size:12px;opacity:.95;line-height:1.35;position:relative;z-index:1}
.fb .btn{background:#fcd34d;color:#3b0764;padding:10px 22px;border-radius:24px;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.5px;box-shadow:0 4px 14px rgba(0,0,0,.25);position:relative;z-index:1}
.fb:hover{filter:brightness(1.06)}
body > iframe, body > ins, body > div:not(.fb){position:relative;z-index:2}
</style></head><body>
<a class="fb" id="fb">
  <span class="ic">📺</span>
  <span class="h">STREAMING<br>PREMIUM</span>
  <span class="s">7 días GRATIS<br>Películas + series</span>
  <span class="btn">VER AHORA</span>
</a>
<script type="text/javascript">atOptions={'key':'56f421252bc25889a156a22a386a874e','format':'iframe','height':250,'width':300,'params':{}};</script>
<script type="text/javascript" src="//www.highperformanceformat.com/56f421252bc25889a156a22a386a874e/invoke.js"></script>
<script>
(function(){
  var fb=document.getElementById('fb');
  fb.addEventListener('click',function(e){
    e.preventDefault();
    if(window.parent!==window){window.parent.postMessage({type:'nr_ad_click',slot:'300x250'},'*');}
  });
  function checkFilled(){
    var subs=document.body.querySelectorAll('iframe,ins,img:not([class])');
    for(var i=0;i<subs.length;i++){
      var r=subs[i].getBoundingClientRect();
      if(r.width>=50&&r.height>=30) return true;
    }
    return false;
  }
  setTimeout(function(){if(!checkFilled())fb.classList.add('show');},4000);
})();
</script>
</body></html>
